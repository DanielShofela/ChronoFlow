<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="630" fill="#0F172A"/>
    <circle cx="600" cy="315" r="240" fill="none" stroke="#3B82F6" stroke-width="24"/>
    <g transform="translate(600 315)">
        <!-- 12 o'clock marker -->
        <line x1="0" y1="-220" x2="0" y2="-180" stroke="#3B82F6" stroke-width="12"/>
        <!-- 3 o'clock marker -->
        <line x1="220" y1="0" x2="180" y2="0" stroke="#3B82F6" stroke-width="12"/>
        <!-- 6 o'clock marker -->
        <line x1="0" y1="220" x2="0" y2="180" stroke="#3B82F6" stroke-width="12"/>
        <!-- 9 o'clock marker -->
        <line x1="-220" y1="0" x2="-180" y2="0" stroke="#3B82F6" stroke-width="12"/>
    </g>
    <text x="600" y="120" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle">ChronoFlow</text>
    <text x="600" y="510" fill="#94A3B8" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">Planification d'activités avec horloge 24h</text>
